<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>FortniteTools</title>
    <link rel="stylesheet" href="../style/searchAssets.css">
</head>
<body>
    <header>
        <span id="top"></span>
        <a href="#top" class="header-arrow-up"><i class="fa-solid fa-arrow-up"></i></a>
        <div id="header-container">
            <div id="logo">
                <h1><a href="../../index.html">Fortnite Tools</a></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="./deviceMeshs.html">DeviceMeshs</a></li>
                    <li><a href="" style="color: #ec7519">SearchAssets</a></li>
                    <li><a href="./convert.html">Convert</a></li>
                    <li><a href="./pathModifier.html">PathModifier</a></li>
                    <li><a href="./id.html">Id</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div id="searchAssets">

            <!-- Search panel -->
            <div class="search-container">
                <label for="keywords">Assets</label>
                <input type="text" id="keywords" placeholder="Keywords separated by spaces or commas" autocomplete="off">

                <div class="checkbox-group">
                    <input type="checkbox" id="formatted">
                    <label for="formatted">Formatted</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="addC">
                    <label for="addC">Add _C</label>
                </div>

                <button class="search-btn">Search</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    Searching...
                </div>
            </div>

            <!-- Result count -->
            <div id="results-count"></div>

            <!-- Results table -->
            <div class="table-wrapper">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Asset Path</th>
                        </tr>
                    </thead>
                    <tbody id="results"></tbody>
                </table>
            </div>

        </div>
    </main>
    <script src="https://kit.fontawesome.com/1d1c3ac163.js" crossorigin="anonymous"></script>
    <script src="../js/searchAssets.js"></script>
</body>
</html>
