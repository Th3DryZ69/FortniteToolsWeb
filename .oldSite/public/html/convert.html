<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>FortniteTools</title>
    <link rel="stylesheet" href="../style/convert.css">
</head>
<body>
    <header> 
        <div id="header-container">
            <div id="logo">
                <h1><a href="../../index.html">Fortnite Tools</a></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="./deviceMeshs.html">DeviceMeshs</a></li>
                    <li><a href="./searchAssets.html">SearchAssets</a></li>
                    <li><a href=""  style="color: #ec7519">Convert</a></li>
                    <li><a href="./pathModifier.html">PathModifier</a></li>
                    <li><a href="./id.html">Id</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section>
            <div id="convert">
                <div id="emoteToAnimation">
                    <p>Emote to Animation</p>
                    <input type="text" id="emoteId" placeholder="EID_DanceMoves" autocomplete="off">
                    <button id="convertEmoteToAnimation">Convert</button>
                    <p id="animationPath">Animation: -</p>
                </div>
                <div id="emoteToAudio">
                    <p>Emote to Audio</p>
                    <input type="text" id="emoteIdAudio" placeholder="EID_DanceMoves" autocomplete="off">
                    <button id="convertEmoteToAudio">Convert</button>
                    <p id="audioPath">Audio: -</p>
                </div>
                <div id="auraToVFX">
                    <p>Aura to VFX</p>
                    <input type="text" id="auraId" placeholder="SparksAura_BoomBox" autocomplete="off">
                    <button id="convertAuraToVFX">Convert</button>
                    <p id="vfxPath">VFX: -</p>
                </div>
                <div id="musicpackToAudio">
                    <p>MusicPack to Audio</p>
                    <input type="text" id="musicpackId" placeholder="MusicPack_001_Floss" autocomplete="off">
                    <button id="convertMusicPackToAudio">Convert</button>
                    <p id="audioPath1">Audio: -</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>If you prefer the new site, click <a href="../../../index.html">here</a>.</p>
    </footer>
    <script src="https://kit.fontawesome.com/1d1c3ac163.js" crossorigin="anonymous"></script>
    <script src="../js/convert.js"></script>
</body>
</html>
